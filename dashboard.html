<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoiris Blog Dashboard</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Icons & Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #1e0033 50%, #000428 100%);
      color: #e0e7ff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(20, 20, 50, 0.45);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(100, 100, 255, 0.2);
      border-radius: 28px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
    }
    .upload-area {
      background: rgba(255, 255, 255, 0.05);
      border: 2px dashed rgba(150, 150, 255, 0.3);
      border-radius: 24px;
      padding: 60px 30px;
      text-align: center;
      cursor: pointer;
    }
    .upload-area.dragover {
      background: rgba(167, 139, 250, 0.2);
      border-color: #a78bfa;
    }
    .upload-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .preview-img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 16px;
      cursor: pointer;
    }
    .gold-btn {
      background: linear-gradient(45deg, #ffd700, #ffed4e);
      color: #000;
      font-weight: 800;
      padding: 16px 40px;
      border-radius: 60px;
    }
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #lightbox img {
      max-width: 90%;
      max-height: 90vh;
    }
    #lightbox-close {
      position: absolute;
      top: 30px;
      right: 30px;
      font-size: 48px;
      cursor: pointer;
    }
  </style>
</head>

<body class="py-16 px-6">
  <div class="max-w-7xl mx-auto">

    <h1 class="text-center text-6xl font-black mb-16">ZOIRIS BLOG DASHBOARD</h1>

    <div class="glass-card p-12 mb-20">
      <form id="blogForm" class="space-y-10">

        <!-- Featured -->
        <div>
          <div id="featuredDrop" class="upload-area">
            <input id="featuredFile" type="file" accept="image/*" required style="display:none" />
            <i class="fas fa-camera upload-icon"></i>
            <p>Click or drag featured image</p>
          </div>
          <div id="featuredPreview" class="preview-grid hidden"></div>
        </div>

        <!-- Gallery -->
        <div>
          <div id="galleryDrop" class="upload-area">
            <input id="galleryFile" type="file" accept="image/*" multiple style="display:none" />
            <i class="fas fa-images upload-icon"></i>
            <p>Click or drag gallery images</p>
          </div>
          <div id="galleryPreview" class="preview-grid hidden"></div>
        </div>

        <input id="title" placeholder="Title" required class="w-full p-4 rounded bg-white/10" />
        <input id="date" type="date" required class="w-full p-4 rounded bg-white/10" />
        <input id="readTime" type="number" value="5" min="1" class="w-full p-4 rounded bg-white/10" />
        <textarea id="excerpt" rows="3" placeholder="Excerpt" required class="w-full p-4 rounded bg-white/10"></textarea>
        <textarea id="content" rows="8" placeholder="Content" required class="w-full p-4 rounded bg-white/10"></textarea>

        <button class="gold-btn w-full text-2xl">Publish</button>
      </form>

      <div id="status" class="mt-6 text-center text-xl"></div>
    </div>

    <div id="postsList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox">
    <span id="lightbox-close">&times;</span>
    <img id="lightbox-img" />
  </div>

<script>
/* SUPABASE INITIALIZATION - Updated with your provided keys */
const supabaseUrl = 'https://dwxbzltxsdeshmmtcycv.supabase.co';
const supabaseKey = 'sb_publishable_4PWdqRYFR0E-tp-OjdTP3Q_S_5qvRbp';

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
const bucket = 'blog-images';

document.getElementById('date').valueAsDate = new Date();

/* Lightbox */
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').style.display = 'flex';
}
document.getElementById('lightbox-close').onclick = () =>
  document.getElementById('lightbox').style.display = 'none';

/* Upload Setup */
const featuredDrop = document.getElementById('featuredDrop');
const featuredFile = document.getElementById('featuredFile');
const featuredPreview = document.getElementById('featuredPreview');

const galleryDrop = document.getElementById('galleryDrop');
const galleryFile = document.getElementById('galleryFile');
const galleryPreview = document.getElementById('galleryPreview');

function setupUpload(drop, input, preview) {
  drop.onclick = () => input.click();
  drop.ondrop = e => {
    e.preventDefault();
    drop.classList.remove('dragover');
    input.files = e.dataTransfer.files;
    showPreview(input.files, preview);
  };
  drop.ondragover = e => {
    e.preventDefault();
    drop.classList.add('dragover');
  };
  drop.ondragleave = () => drop.classList.remove('dragover');
  input.onchange = () => showPreview(input.files, preview);
}

function showPreview(files, preview) {
  preview.innerHTML = '';
  preview.classList.remove('hidden');
  [...files].forEach(f => {
    const img = document.createElement('img');
    img.className = 'preview-img';
    img.src = URL.createObjectURL(f);
    img.onclick = () => openLightbox(img.src);
    preview.appendChild(img);
  });
}

setupUpload(featuredDrop, featuredFile, featuredPreview);
setupUpload(galleryDrop, galleryFile, galleryPreview);

/* Upload Files */
async function uploadFiles(files, path) {
  const urls = [];
  for (const file of files) {
    const fileName = `${path}/${Date.now()}-${file.name}`;
    const { error } = await supabaseClient.storage.from(bucket).upload(fileName, file);
    if (error) {
      console.error('Upload error:', error);
      throw error;
    }
    const { data: { publicUrl } } = supabaseClient.storage.from(bucket).getPublicUrl(fileName);
    urls.push(publicUrl);
  }
  return urls;
}

/* Form Submit */
const blogForm = document.getElementById('blogForm');
const status = document.getElementById('status');
const title = document.getElementById('title');
const date = document.getElementById('date');
const readTime = document.getElementById('readTime');
const excerpt = document.getElementById('excerpt');
const content = document.getElementById('content');

blogForm.onsubmit = async e => {
  e.preventDefault();
  status.textContent = 'Uploading images...';

  try {
    if (featuredFile.files.length === 0) {
      status.textContent = 'Please select a featured image';
      return;
    }

    const [image_url] = await uploadFiles(featuredFile.files, 'featured');

    let gallery_urls = null;
    if (galleryFile.files.length > 0) {
      gallery_urls = await uploadFiles(galleryFile.files, 'gallery');
    }

    status.textContent = 'Publishing post...';

    const { error } = await supabaseClient.from('blogs').insert({
      title: title.value,
      date: date.value,
      read_time: parseInt(readTime.value),
      image_url,
      gallery_urls,
      excerpt: excerpt.value,
      content: content.value
    });

    if (error) throw error;

    status.textContent = 'Published 🚀';
    blogForm.reset();
    featuredPreview.classList.add('hidden');
    galleryPreview.classList.add('hidden');
    loadPosts(); // Refresh list
  } catch (err) {
    status.textContent = `Error: ${err.message || err}`;
    console.error(err);
  }
};

/* Load Existing Posts */
const postsList = document.getElementById('postsList');

async function loadPosts() {
  const { data, error } = await supabaseClient.from('blogs').select('*').order('date', { ascending: false });
  if (error) {
    console.error('Load posts error:', error);
    return;
  }

  postsList.innerHTML = data.map(p => `
    <div class="glass-card p-6 cursor-pointer" onclick="openLightbox('${p.image_url}')">
      <img src="${p.image_url}" alt="${p.title}" class="w-full h-64 object-cover rounded-2xl mb-4">
      <h3 class="text-2xl font-bold">${p.title}</h3>
      <p class="text-sm opacity-70 mt-2">${p.date} • ${p.read_time} min read</p>
      <p class="mt-3">${p.excerpt}</p>
    </div>
  `).join('');
}

loadPosts();
</script>
</body>
</html>
