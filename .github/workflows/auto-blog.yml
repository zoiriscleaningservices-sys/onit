name: Zoiris Auto Blog Agent

on:
  schedule:
    - cron: "*/5 * * * *"  # Every 5 minutes (GitHub's minimum allowed frequency)
  workflow_dispatch:  # Allows manual triggering from GitHub UI

jobs:
  post-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Updated to a more recent LTS version (as of late 2025)

      - name: Install dependencies
        run: npm install node-fetch  # Or better: use npm ci if you have a package-lock.json

      - name: Run AI Agent
        run: node agent.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
